# Netlify Configuration for Flutter Web App
# AI Orthodontic Demo Application

[build]
  # Command to build Flutter Web app
  command = "flutter pub get && flutter build web --release --no-tree-shake-icons"
  # Output directory for Netlify to deploy
  publish = "build/web"

[context.production]
  command = "flutter pub get && flutter build web --release --no-tree-shake-icons"

# Redirect routing for single-page app
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache control headers
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "max-age=300, must-revalidate"

[[headers]]
  for = "/build/flutter_service_worker.js"
  [headers.values]
    Cache-Control = "max-age=3600, must-revalidate"

[[headers]]
  for = "/build/canvaskit/*"
  [headers.values]
    Cache-Control = "max-age=31536000, immutable"

# Environment variables (optional - add as needed in Netlify dashboard)
[context.production.environment]
  FLUTTER_MODE = "release"
