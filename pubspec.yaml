name: ai_orthodontic
description: An AI-powered orthodontic aligner application for automated attachment placement and assessing its efficiency in aligner therapy using AI.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.0

  # UI & Material
  cupertino_icons: ^1.0.2
  material_design_icons_flutter: ^7.0.7296
  fl_chart: ^0.63.0

  # File handling
  file_picker: ^6.1.1
  path_provider: ^2.1.1
  path: ^1.8.3

  # Image & Media
  image_picker: ^1.0.4
  image: ^4.1.1
  cached_network_image: ^3.3.1

  # HTTP & API
  http: ^1.1.0

  # Firebase (Authentication, Database, Storage)
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.9

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Local SQLite Database
  sqflite: ^2.3.0

  # Secure Storage & Preferences
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Database & Local Storage (kept for compatibility)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Date & Time
  intl: ^0.19.0

  # Utilities
  get_it: ^7.6.0
  equatable: ^2.0.5
  uuid: ^4.0.0
  logger: ^2.1.0

  # Connectivity
  connectivity_plus: ^5.0.1

  # Animation & Effects
  lottie: ^2.7.0
  animations: ^2.0.11
  shimmer: ^3.0.0

  # Progress & Charts
  percent_indicator: ^4.2.3

  # Clipboard & Share
  share_plus: ^7.2.1

  # PDF generation
  pdf: ^3.10.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
